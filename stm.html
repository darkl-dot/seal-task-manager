<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦭</text></svg>"
        />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>STM - Seal Task Manager</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg-color: #0b0f19;
                --col-bg: rgba(30, 41, 59, 0.7);
                --card-bg: #1e293b;
                --card-hover: #27354f;
                --primary: #3b82f6;
                --primary-hover: #60a5fa;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --danger: #ef4444;
                --radius-lg: 24px;
                --radius-md: 16px;
                --transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            }
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                font-family: "Varela Round", sans-serif;
            }
            body {
                background-color: var(--bg-color);
                color: var(--text-main);
                height: 100vh;
                width: 100vw;
                overflow: hidden;
                background: radial-gradient(
                    circle at top left,
                    #1a233a,
                    var(--bg-color)
                );
                position: relative;
            }
            .bg-shapes {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 0;
                overflow: hidden;
                pointer-events: none;
            }
            .shape {
                position: absolute;
                background: var(--primary);
                opacity: 0.05;
                animation: float 20s infinite linear;
                scale: 1;
                transition:
                    scale 0.8s cubic-bezier(0.34, 1.56, 0.64, 1),
                    opacity 0.6s ease;
            }
            .shape.circle {
                border-radius: 50%;
            }
            .shape.line {
                width: 6px;
                border-radius: 3px;
            }
            .shape.swirl {
                background: transparent;
                border: 8px solid var(--primary);
                border-radius: 50%;
                border-top-color: transparent;
                border-right-color: transparent;
            }
            body.bg-hidden .shape {
                scale: 0;
                opacity: 0;
            }
            @keyframes float {
                0% {
                    transform: translateY(0) rotate(0deg) translateX(0);
                }
                33% {
                    transform: translateY(-50px) rotate(120deg) translateX(30px);
                }
                66% {
                    transform: translateY(50px) rotate(240deg) translateX(-30px);
                }
                100% {
                    transform: translateY(0) rotate(360deg) translateX(0);
                }
            }
            .s1 {
                width: 300px;
                height: 300px;
                top: -50px;
                left: -50px;
                animation-duration: 35s;
            }
            .s2 {
                width: 150px;
                height: 150px;
                bottom: 10%;
                right: 5%;
                animation-duration: 25s;
                animation-direction: reverse;
            }
            .s3 {
                height: 200px;
                top: 20%;
                left: 40%;
                animation-duration: 20s;
            }
            .s4 {
                height: 150px;
                bottom: 30%;
                right: 30%;
                animation-duration: 18s;
                animation-direction: reverse;
            }
            .s5 {
                width: 120px;
                height: 120px;
                top: 40%;
                left: 10%;
                animation-duration: 22s;
            }
            .s6 {
                width: 250px;
                height: 250px;
                top: -20px;
                right: 20%;
                animation-duration: 30s;
            }
            .s7 {
                width: 80px;
                height: 80px;
                bottom: 15%;
                left: 25%;
                animation-duration: 15s;
            }
            .s8 {
                height: 220px;
                top: 60%;
                right: 15%;
                animation-duration: 28s;
                animation-direction: reverse;
            }
            .s9 {
                width: 180px;
                height: 180px;
                top: 10%;
                left: 60%;
                animation-duration: 26s;
            }
            .s10 {
                width: 90px;
                height: 90px;
                bottom: 40%;
                right: 40%;
                animation-duration: 19s;
                animation-direction: reverse;
            }
            header {
                position: absolute;
                top: 2rem;
                left: 2rem;
                z-index: 10;
                pointer-events: none;
            }
            .main-header {
                pointer-events: auto;
                background: rgba(30, 41, 59, 0.4);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: var(--radius-lg);
                width: 250px;
                height: 50px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            }
            .main-header h1 {
                font-size: 1.5rem;
                color: var(--primary);
                text-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
                margin: 0;
                white-space: nowrap;
                transition:
                    opacity 0.3s ease,
                    transform 0.4s ease;
            }
            .main-header.collapsed {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                background: #4facfe;
                box-shadow: 0 0 20px rgba(79, 172, 254, 0.6);
                border-color: transparent;
                animation: headerFloat 4s infinite ease-in-out;
            }
            .main-header.collapsed h1 {
                opacity: 0;
                transform: scale(0.3);
            }
            @keyframes headerFloat {
                0%,
                100% {
                    transform: translate(0, 0);
                }
                33% {
                    transform: translate(6px, -8px);
                }
                66% {
                    transform: translate(-4px, 5px);
                }
            }
            .bg-toggle-btn {
                position: absolute;
                top: 2.5rem;
                right: 2.5rem;
                width: 40px;
                height: 40px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.1);
                color: var(--text-muted);
                cursor: pointer;
                z-index: 10;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
                pointer-events: auto;
            }
            .bg-toggle-btn:hover {
                background: rgba(255, 255, 255, 0.1);
                color: var(--text-main);
                transform: scale(1.1);
            }
            body.bg-hidden .bg-toggle-btn {
                transform: rotate(180deg) scale(0.4);
                opacity: 0.3;
            }
            body.bg-hidden .bg-toggle-btn:hover {
                opacity: 0.8;
                transform: rotate(180deg) scale(0.6);
            }
            .board {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 1;
            }
            .column {
                position: absolute;
                background: var(--col-bg);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border: 1px solid rgba(255, 255, 255, 0.05);
                border-radius: var(--radius-lg);
                width: 320px;
                display: flex;
                flex-direction: column;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                transition: box-shadow 0.3s;
            }
            .column.is-dragging {
                transform: scale(1.02);
                box-shadow:
                    0 30px 60px rgba(0, 0, 0, 0.4),
                    0 0 30px rgba(59, 130, 246, 0.2);
                z-index: 100 !important;
                transition: none;
            }
            .drag-handle {
                position: absolute;
                top: -10px;
                left: -10px;
                width: 28px;
                height: 28px;
                background: var(--primary);
                border-radius: 50%;
                box-shadow:
                    0 0 10px var(--primary),
                    0 0 20px var(--primary);
                cursor: grab;
                opacity: 0;
                transition:
                    opacity 0.3s,
                    transform 0.2s;
                z-index: 20;
                pointer-events: auto;
            }
            body.edit-mode .drag-handle {
                opacity: 1;
                animation: pulse 2s infinite;
            }
            @keyframes pulse {
                0% {
                    box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
                }
                70% {
                    box-shadow: 0 0 0 15px rgba(59, 130, 246, 0);
                }
                100% {
                    box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
                }
            }
            .drag-handle:active {
                cursor: grabbing;
                transform: scale(1.2);
                animation: none;
            }
            .column-header {
                padding: 1.2rem;
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                pointer-events: auto;
            }
            .column-title-wrap {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                flex: 1;
                min-width: 0;
            }
            .column-title {
                font-size: 1.2rem;
                font-weight: 600;
                cursor: pointer;
                transition: color 0.2s;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .column-title:hover {
                color: var(--primary-hover);
            }
            .column-title-input {
                background: transparent;
                border: none;
                border-bottom: 2px solid var(--primary);
                color: var(--text-main);
                font-size: 1.2rem;
                font-family: inherit;
                font-weight: 600;
                outline: none;
                width: 100%;
                min-width: 0;
                padding: 0;
            }
            .counter {
                background: rgba(59, 130, 246, 0.2);
                color: var(--primary-hover);
                padding: 0.2rem 0.6rem;
                border-radius: 20px;
                font-size: 0.9rem;
                flex-shrink: 0;
            }
            .col-actions {
                display: flex;
                gap: 0.5rem;
                flex-shrink: 0;
            }
            .icon-btn {
                background: transparent;
                border: none;
                color: var(--text-muted);
                font-size: 1.2rem;
                cursor: pointer;
                width: 28px;
                height: 28px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: var(--transition);
                pointer-events: auto;
            }
            .icon-btn:hover {
                background: rgba(255, 255, 255, 0.1);
                color: var(--text-main);
            }
            .add-task-btn:hover {
                color: var(--primary);
                background: rgba(59, 130, 246, 0.1);
            }
            .del-col-btn:hover {
                color: var(--danger);
                background: rgba(239, 68, 68, 0.1);
            }
            .card-list {
                padding: 1rem;
                min-height: 100px;
                max-height: calc(100vh - 200px);
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                gap: 1rem;
                transition: var(--transition);
            }
            .card-list.drag-over {
                background: rgba(255, 255, 255, 0.03);
                border-radius: 0 0 var(--radius-lg) var(--radius-lg);
            }
            .card {
                background: var(--card-bg);
                border-radius: var(--radius-md);
                padding: 1.2rem;
                cursor: grab;
                position: relative;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                transition: var(--transition);
                border: 1px solid rgba(255, 255, 255, 0.02);
                pointer-events: auto;
            }
            .card:hover {
                transform: translateY(-4px);
                background: var(--card-hover);
                box-shadow:
                    0 12px 20px rgba(0, 0, 0, 0.2),
                    0 0 15px rgba(59, 130, 246, 0.1);
            }
            .card:active {
                cursor: grabbing;
            }
            .card.dragging {
                opacity: 0.4;
                transform: scale(0.95);
            }
            .card-label {
                width: 40px;
                height: 6px;
                border-radius: 3px;
                margin-bottom: 0.8rem;
            }
            .card-title {
                font-size: 1.1rem;
                margin-bottom: 0.5rem;
                word-wrap: break-word;
            }
            .card-desc {
                font-size: 0.9rem;
                color: var(--text-muted);
                word-wrap: break-word;
            }
            .delete-btn {
                position: absolute;
                top: 0.8rem;
                right: 0.8rem;
                background: rgba(239, 68, 68, 0.1);
                color: var(--danger);
                border: none;
                width: 28px;
                height: 28px;
                border-radius: 50%;
                cursor: pointer;
                opacity: 0;
                transform: scale(0.8);
                transition: var(--transition);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.2rem;
                pointer-events: auto;
            }
            .card:hover .delete-btn {
                opacity: 1;
                transform: scale(1);
            }
            .delete-btn:hover {
                background: var(--danger);
                color: white;
            }
            .confirm-overlay {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.6);
                backdrop-filter: blur(5px);
                display: flex;
                align-items: center;
                justify-content: center;
                opacity: 0;
                pointer-events: none;
                transition: var(--transition);
                z-index: 3000;
            }
            .confirm-overlay.active {
                opacity: 1;
                pointer-events: all;
            }
            .confirm-box {
                background: var(--card-bg);
                padding: 2rem;
                border-radius: var(--radius-lg);
                width: 360px;
                max-width: 90%;
                transform: translateY(20px) scale(0.95);
                transition: var(--transition);
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
                border: 1px solid rgba(255, 255, 255, 0.05);
            }
            .confirm-overlay.active .confirm-box {
                transform: translateY(0) scale(1);
            }
            .confirm-box p {
                color: var(--text-muted);
                margin-top: 0.5rem;
                font-size: 0.95rem;
                line-height: 1.5;
            }
            .confirm-box h3 {
                color: var(--text-main);
                font-size: 1.1rem;
            }
            .confirm-actions {
                display: flex;
                justify-content: flex-end;
                gap: 1rem;
                margin-top: 1.5rem;
            }
            .fab-container {
                position: fixed;
                bottom: 40px;
                right: 40px;
                display: flex;
                gap: 15px;
                z-index: 1000;
            }
            .fab {
                width: 64px;
                height: 64px;
                border-radius: 50%;
                background: var(--primary);
                color: white;
                font-size: 2rem;
                border: none;
                cursor: pointer;
                box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4);
                display: flex;
                align-items: center;
                justify-content: center;
                transition:
                    transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1),
                    background 0.3s;
            }
            .fab:hover {
                transform: scale(1.1);
                background: var(--primary-hover);
            }
            .fab-add-col:hover {
                transform: scale(1.1) rotate(90deg);
            }
            .fab-toggle-edit {
                background: var(--card-hover);
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            }
            .fab-toggle-edit.active {
                background: var(--primary);
                box-shadow: 0 0 20px var(--primary);
            }
            .modal-overlay {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.6);
                backdrop-filter: blur(5px);
                display: flex;
                align-items: center;
                justify-content: center;
                opacity: 0;
                pointer-events: none;
                transition: var(--transition);
                z-index: 2000;
            }
            .modal-overlay.active {
                opacity: 1;
                pointer-events: all;
            }
            .modal {
                background: var(--card-bg);
                padding: 2rem;
                border-radius: var(--radius-lg);
                width: 400px;
                max-width: 90%;
                transform: translateY(20px) scale(0.95);
                transition: var(--transition);
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
                border: 1px solid rgba(255, 255, 255, 0.05);
            }
            .modal-overlay.active .modal {
                transform: translateY(0) scale(1);
            }
            .modal h2 {
                margin-bottom: 1.5rem;
                color: var(--primary);
            }
            .input-group {
                margin-bottom: 1.2rem;
            }
            .input-group label {
                display: block;
                margin-bottom: 0.5rem;
                font-size: 0.9rem;
                color: var(--text-muted);
            }
            input,
            textarea {
                width: 100%;
                padding: 0.8rem 1rem;
                border-radius: 12px;
                border: 1px solid rgba(255, 255, 255, 0.1);
                background: rgba(0, 0, 0, 0.2);
                color: var(--text-main);
                font-size: 1rem;
                transition: var(--transition);
                outline: none;
            }
            input:focus,
            textarea:focus {
                border-color: var(--primary);
                box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            }
            textarea {
                resize: vertical;
                min-height: 80px;
            }
            .color-picker {
                display: flex;
                gap: 0.8rem;
                margin-top: 0.5rem;
            }
            .color-option {
                width: 30px;
                height: 30px;
                border-radius: 50%;
                cursor: pointer;
                border: 2px solid transparent;
                transition: var(--transition);
            }
            .color-option.selected {
                transform: scale(1.2);
                border-color: white;
            }
            .modal-actions {
                display: flex;
                justify-content: flex-end;
                gap: 1rem;
                margin-top: 2rem;
            }
            .btn {
                padding: 0.6rem 1.2rem;
                border-radius: 10px;
                border: none;
                cursor: pointer;
                font-weight: 600;
                transition: var(--transition);
                font-family: inherit;
            }
            .btn-cancel {
                background: transparent;
                color: var(--text-muted);
            }
            .btn-cancel:hover {
                background: rgba(255, 255, 255, 0.05);
                color: var(--text-main);
            }
            .btn-save {
                background: var(--primary);
                color: white;
            }
            .btn-save:hover {
                background: var(--primary-hover);
                box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
            }
            .btn-danger {
                background: var(--danger);
                color: white;
            }
            .btn-danger:hover {
                background: #dc2626;
                box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
            }
            ::-webkit-scrollbar {
                width: 6px;
                height: 6px;
            }
            ::-webkit-scrollbar-track {
                background: transparent;
            }
            ::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.1);
                border-radius: 3px;
            }
            ::-webkit-scrollbar-thumb:hover {
                background: rgba(255, 255, 255, 0.2);
            }
        </style>
    </head>
    <body>
        <button class="bg-toggle-btn" id="bgToggleBtn" title="Переключить фон">
            <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
            >
                <path
                    d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"
                />
            </svg>
        </button>
        <div class="bg-shapes">
            <div class="shape circle s1"></div>
            <div class="shape circle s2"></div>
            <div class="shape line s3"></div>
            <div class="shape line s4"></div>
            <div class="shape swirl s5"></div>
            <div class="shape circle s6"></div>
            <div class="shape circle s7"></div>
            <div class="shape line s8"></div>
            <div class="shape circle s9"></div>
            <div class="shape swirl s10"></div>
        </div>
        <header>
            <div class="main-header" id="mainHeader" onclick="toggleHeader()">
                <h1>Seal TM</h1>
            </div>
        </header>
        <div class="board" id="board"></div>
        <div class="fab-container">
            <button
                class="fab fab-toggle-edit"
                id="editModeBtn"
                title="Режим перемещения досок"
            >
                <svg
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
            </button>
            <button
                class="fab fab-add-col"
                id="addColBtn"
                title="Добавить колонку"
            >
                +
            </button>
        </div>
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal">
                <h2>Новая задача</h2>
                <div class="input-group">
                    <label for="taskTitle">Заголовок</label>
                    <input
                        type="text"
                        id="taskTitle"
                        placeholder="Что нужно сделать?"
                        autocomplete="off"
                    />
                </div>
                <div class="input-group">
                    <label for="taskDesc">Описание (опционально)</label>
                    <textarea
                        id="taskDesc"
                        placeholder="Дополнительные детали..."
                    ></textarea>
                </div>
                <div class="input-group">
                    <label>Цвет метки</label>
                    <div class="color-picker" id="colorPicker">
                        <div
                            class="color-option selected"
                            style="background: #3b82f6"
                            data-color="#3b82f6"
                        ></div>
                        <div
                            class="color-option"
                            style="background: #ef4444"
                            data-color="#ef4444"
                        ></div>
                        <div
                            class="color-option"
                            style="background: #10b981"
                            data-color="#10b981"
                        ></div>
                        <div
                            class="color-option"
                            style="background: #f59e0b"
                            data-color="#f59e0b"
                        ></div>
                        <div
                            class="color-option"
                            style="background: #8b5cf6"
                            data-color="#8b5cf6"
                        ></div>
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-cancel" id="cancelBtn">
                        Отмена
                    </button>
                    <button class="btn btn-save" id="saveBtn">Добавить</button>
                </div>
            </div>
        </div>
        <div class="confirm-overlay" id="confirmOverlay">
            <div class="confirm-box">
                <h3 id="confirmTitle">Удалить колонку?</h3>
                <p id="confirmText"></p>
                <div class="confirm-actions">
                    <button class="btn btn-cancel" id="confirmCancelBtn">
                        Отмена
                    </button>
                    <button class="btn btn-danger" id="confirmOkBtn">
                        Удалить
                    </button>
                </div>
            </div>
        </div>
        <script>
            function getInitialState() {
                try {
                    const saved = JSON.parse(
                        localStorage.getItem("kanban_freeboard"),
                    );
                    if (saved && saved.columns) return saved;
                } catch (e) {}
                return {
                    highestZ: 10,
                    columns: [
                        {
                            id: "todo",
                            title: "To Do",
                            x: 60,
                            y: 120,
                            z: 10,
                            tasks: [],
                        },
                        {
                            id: "inprogress",
                            title: "In Progress",
                            x: 410,
                            y: 120,
                            z: 11,
                            tasks: [],
                        },
                        {
                            id: "done",
                            title: "Done",
                            x: 760,
                            y: 120,
                            z: 12,
                            tasks: [],
                        },
                    ],
                };
            }
            let state = getInitialState();
            let currentTargetCol = null;
            let selectedColor = "#3b82f6";
            let draggedTaskItem = null;
            let isEditMode = false;
            let activeColDOM = null;
            let activeColId = null;
            let colOffsetX = 0;
            let colOffsetY = 0;
            let confirmCallback = null;
            function saveState() {
                localStorage.setItem("kanban_freeboard", JSON.stringify(state));
            }
            function showConfirm(title, text, onConfirm) {
                document.getElementById("confirmTitle").textContent = title;
                document.getElementById("confirmText").textContent = text;
                confirmCallback = onConfirm;
                document
                    .getElementById("confirmOverlay")
                    .classList.add("active");
            }
            function closeConfirm() {
                document
                    .getElementById("confirmOverlay")
                    .classList.remove("active");
                confirmCallback = null;
            }
            document
                .getElementById("confirmCancelBtn")
                .addEventListener("click", closeConfirm);
            document
                .getElementById("confirmOkBtn")
                .addEventListener("click", () => {
                    if (confirmCallback) confirmCallback();
                    closeConfirm();
                });
            document
                .getElementById("confirmOverlay")
                .addEventListener("click", (e) => {
                    if (e.target === e.currentTarget) closeConfirm();
                });
            function renderBoard() {
                const board = document.getElementById("board");
                board.innerHTML = "";
                state.columns.forEach((col) => {
                    const colEl = document.createElement("div");
                    colEl.className = "column";
                    colEl.dataset.col = col.id;
                    colEl.style.left = col.x + "px";
                    colEl.style.top = col.y + "px";
                    colEl.style.zIndex = col.z || 10;
                    const handle = document.createElement("div");
                    handle.className = "drag-handle";
                    handle.addEventListener("pointerdown", startColDrag);
                    colEl.appendChild(handle);
                    const header = document.createElement("div");
                    header.className = "column-header";
                    const titleWrap = document.createElement("div");
                    titleWrap.className = "column-title-wrap";
                    const titleEl = document.createElement("span");
                    titleEl.className = "column-title";
                    titleEl.textContent = col.title;
                    titleEl.title = "Нажмите, чтобы переименовать";
                    titleEl.addEventListener("click", () =>
                        renameColumn(col.id),
                    );
                    const counter = document.createElement("span");
                    counter.className = "counter";
                    counter.textContent = col.tasks.length;
                    titleWrap.appendChild(titleEl);
                    titleWrap.appendChild(counter);
                    const actions = document.createElement("div");
                    actions.className = "col-actions";
                    const addBtn = document.createElement("button");
                    addBtn.className = "icon-btn add-task-btn";
                    addBtn.textContent = "+";
                    addBtn.title = "Добавить задачу";
                    addBtn.addEventListener("click", (e) => {
                        e.stopPropagation();
                        openModal(col.id);
                    });
                    const delBtn = document.createElement("button");
                    delBtn.className = "icon-btn del-col-btn";
                    delBtn.textContent = "×";
                    delBtn.title = "Удалить колонку";
                    delBtn.addEventListener("click", (e) => {
                        e.stopPropagation();
                        deleteColumn(col.id);
                    });
                    actions.appendChild(addBtn);
                    actions.appendChild(delBtn);
                    header.appendChild(titleWrap);
                    header.appendChild(actions);
                    colEl.appendChild(header);
                    const list = document.createElement("div");
                    list.className = "card-list";
                    list.id = "list-" + col.id;
                    list.addEventListener("dragover", handleTaskDragOver);
                    list.addEventListener("dragleave", handleTaskDragLeave);
                    list.addEventListener("drop", (e) =>
                        handleTaskDrop(e, col.id),
                    );
                    col.tasks.forEach((task) => {
                        const card = document.createElement("div");
                        card.className = "card";
                        card.draggable = true;
                        card.id = task.id;
                        card.dataset.col = col.id;
                        card.addEventListener("dragstart", handleTaskDragStart);
                        card.addEventListener("dragend", handleTaskDragEnd);
                        const delTaskBtn = document.createElement("button");
                        delTaskBtn.className = "delete-btn";
                        delTaskBtn.textContent = "×";
                        delTaskBtn.addEventListener("click", (e) => {
                            e.stopPropagation();
                            deleteTask(col.id, task.id);
                        });
                        const label = document.createElement("div");
                        label.className = "card-label";
                        label.style.backgroundColor = task.color;
                        const cardTitle = document.createElement("h3");
                        cardTitle.className = "card-title";
                        cardTitle.textContent = task.title;
                        card.appendChild(delTaskBtn);
                        card.appendChild(label);
                        card.appendChild(cardTitle);
                        if (task.desc) {
                            const desc = document.createElement("p");
                            desc.className = "card-desc";
                            desc.textContent = task.desc;
                            card.appendChild(desc);
                        }
                        list.appendChild(card);
                    });
                    colEl.appendChild(list);
                    board.appendChild(colEl);
                });
            }
            function renameColumn(colId) {
                if (isEditMode) return;
                const col = state.columns.find((c) => c.id === colId);
                if (!col) return;
                const titleEl = document.querySelector(
                    `[data-col="${colId}"] .column-title`,
                );
                if (!titleEl) return;
                const input = document.createElement("input");
                input.className = "column-title-input";
                input.value = col.title;
                titleEl.replaceWith(input);
                input.focus();
                input.select();
                let committed = false;
                const commit = () => {
                    if (committed) return;
                    committed = true;
                    const val = input.value.trim() || col.title;
                    col.title = val;
                    saveState();
                    renderBoard();
                };
                input.addEventListener("blur", commit);
                input.addEventListener("keydown", (e) => {
                    if (e.key === "Enter") {
                        e.preventDefault();
                        input.blur();
                    }
                    if (e.key === "Escape") {
                        committed = true;
                        renderBoard();
                    }
                });
            }
            function startColDrag(e) {
                if (!isEditMode) return;
                e.preventDefault();
                e.stopPropagation();
                activeColDOM = e.currentTarget.closest(".column");
                if (!activeColDOM) return;
                activeColId = activeColDOM.dataset.col;
                state.highestZ = (state.highestZ || 10) + 1;
                activeColDOM.style.zIndex = state.highestZ;
                const colData = state.columns.find((c) => c.id === activeColId);
                if (colData) colData.z = state.highestZ;
                const rect = activeColDOM.getBoundingClientRect();
                colOffsetX = e.clientX - rect.left;
                colOffsetY = e.clientY - rect.top;
                activeColDOM.classList.add("is-dragging");
                document.addEventListener("pointermove", onColDragMove);
                document.addEventListener("pointerup", onColDragEnd);
            }
            function onColDragMove(e) {
                if (!activeColDOM) return;
                activeColDOM.style.left = e.clientX - colOffsetX + "px";
                activeColDOM.style.top = e.clientY - colOffsetY + "px";
            }
            function onColDragEnd(e) {
                if (!activeColDOM) return;
                const colData = state.columns.find((c) => c.id === activeColId);
                if (colData) {
                    colData.x = parseFloat(activeColDOM.style.left) || 0;
                    colData.y = parseFloat(activeColDOM.style.top) || 0;
                    saveState();
                }
                activeColDOM.classList.remove("is-dragging");
                activeColDOM = null;
                activeColId = null;
                document.removeEventListener("pointermove", onColDragMove);
                document.removeEventListener("pointerup", onColDragEnd);
            }
            function toggleHeader() {
                document
                    .getElementById("mainHeader")
                    .classList.toggle("collapsed");
            }
            function toggleBg() {
                const isHidden = document.body.classList.toggle("bg-hidden");
                localStorage.setItem("kanban_bg_hidden", isHidden);
            }
            function toggleEditMode() {
                isEditMode = !isEditMode;
                document.body.classList.toggle("edit-mode", isEditMode);
                document
                    .getElementById("editModeBtn")
                    .classList.toggle("active", isEditMode);
            }
            function addNewColumn() {
                state.highestZ = (state.highestZ || 10) + 1;
                const newCol = {
                    id: "col_" + Date.now(),
                    title: "Новая колонка",
                    x: Math.max(
                        20,
                        window.innerWidth / 2 -
                            160 +
                            (Math.random() - 0.5) * 100,
                    ),
                    y: Math.max(
                        20,
                        window.innerHeight / 2 -
                            100 +
                            (Math.random() - 0.5) * 60,
                    ),
                    z: state.highestZ,
                    tasks: [],
                };
                state.columns.push(newCol);
                saveState();
                renderBoard();
                setTimeout(() => renameColumn(newCol.id), 50);
            }
            function deleteColumn(colId) {
                const col = state.columns.find((c) => c.id === colId);
                if (!col) return;
                const taskCount = col.tasks.length;
                const text =
                    taskCount > 0
                        ? `Колонка "${col.title}" содержит ${taskCount} задач${taskCount === 1 ? "у" : taskCount < 5 ? "и" : ""}. Всё будет удалено.`
                        : `Колонка "${col.title}" будет удалена.`;
                showConfirm("Удалить колонку?", text, () => {
                    state.columns = state.columns.filter((c) => c.id !== colId);
                    saveState();
                    renderBoard();
                });
            }
            function handleTaskDragStart(e) {
                if (isEditMode) {
                    e.preventDefault();
                    return;
                }
                draggedTaskItem = {
                    id: e.currentTarget.id,
                    colId: e.currentTarget.dataset.col,
                };
                e.dataTransfer.effectAllowed = "move";
                setTimeout(() => e.currentTarget.classList.add("dragging"), 0);
            }
            function handleTaskDragEnd(e) {
                e.currentTarget.classList.remove("dragging");
                document
                    .querySelectorAll(".card-list")
                    .forEach((l) => l.classList.remove("drag-over"));
                draggedTaskItem = null;
            }
            function handleTaskDragOver(e) {
                e.preventDefault();
                e.currentTarget.classList.add("drag-over");
            }
            function handleTaskDragLeave(e) {
                e.currentTarget.classList.remove("drag-over");
            }
            function handleTaskDrop(e, targetColId) {
                e.preventDefault();
                e.currentTarget.classList.remove("drag-over");
                if (!draggedTaskItem) return;
                const { id: taskId, colId: sourceColId } = draggedTaskItem;
                if (sourceColId === targetColId) return;
                const sourceCol = state.columns.find(
                    (c) => c.id === sourceColId,
                );
                const targetCol = state.columns.find(
                    (c) => c.id === targetColId,
                );
                const idx = sourceCol.tasks.findIndex((t) => t.id === taskId);
                if (idx > -1) {
                    const [task] = sourceCol.tasks.splice(idx, 1);
                    targetCol.tasks.push(task);
                    saveState();
                    renderBoard();
                }
            }
            function deleteTask(colId, taskId) {
                const col = state.columns.find((c) => c.id === colId);
                if (!col) return;
                col.tasks = col.tasks.filter((t) => t.id !== taskId);
                saveState();
                renderBoard();
            }
            function openModal(colId) {
                currentTargetCol = colId;
                document.getElementById("taskTitle").value = "";
                document.getElementById("taskDesc").value = "";
                document.getElementById("modalOverlay").classList.add("active");
                setTimeout(
                    () => document.getElementById("taskTitle").focus(),
                    100,
                );
            }
            function closeModal() {
                document
                    .getElementById("modalOverlay")
                    .classList.remove("active");
                currentTargetCol = null;
            }
            function saveTask() {
                const title = document.getElementById("taskTitle").value.trim();
                const desc = document.getElementById("taskDesc").value.trim();
                if (!title) {
                    document.getElementById("taskTitle").focus();
                    return;
                }
                const col = state.columns.find(
                    (c) => c.id === currentTargetCol,
                );
                if (!col) return;
                col.tasks.push({
                    id:
                        "task_" +
                        Date.now() +
                        Math.random().toString(36).substring(2, 7),
                    title,
                    desc,
                    color: selectedColor,
                });
                saveState();
                renderBoard();
                closeModal();
            }
            function setupColorPicker() {
                document.querySelectorAll(".color-option").forEach((opt) => {
                    opt.addEventListener("click", () => {
                        document
                            .querySelectorAll(".color-option")
                            .forEach((o) => o.classList.remove("selected"));
                        opt.classList.add("selected");
                        selectedColor = opt.dataset.color;
                    });
                });
            }
            document
                .getElementById("editModeBtn")
                .addEventListener("click", toggleEditMode);
            document
                .getElementById("addColBtn")
                .addEventListener("click", addNewColumn);
            document
                .getElementById("bgToggleBtn")
                .addEventListener("click", toggleBg);
            document
                .getElementById("cancelBtn")
                .addEventListener("click", closeModal);
            document
                .getElementById("saveBtn")
                .addEventListener("click", saveTask);
            document
                .getElementById("modalOverlay")
                .addEventListener("click", (e) => {
                    if (e.target === e.currentTarget) closeModal();
                });
            document
                .getElementById("taskTitle")
                .addEventListener("keydown", (e) => {
                    if (e.key === "Enter") saveTask();
                    if (e.key === "Escape") closeModal();
                });
            if (localStorage.getItem("kanban_bg_hidden") === "true") {
                document.body.classList.add("bg-hidden");
            }
            setupColorPicker();
            renderBoard();
        </script>
    </body>
</html>
